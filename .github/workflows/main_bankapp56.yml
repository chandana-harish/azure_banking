# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - bankapp56

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build application
        run: npm run build

      - name: Prepare deployment artifact
        run: |
          mkdir -p release
          cp package.json release/package.json
          cp next.config.mjs release/next.config.mjs
          cp next-env.d.ts release/next-env.d.ts
          cp postcss.config.js release/postcss.config.js
          cp tailwind.config.ts release/tailwind.config.ts
          cp tsconfig.json release/tsconfig.json
          cp -R src release/src
          cp -R prisma release/prisma
          if [ -d public ]; then cp -R public release/public; fi

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7A77674C40234E6C9F380DFF2455E911 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9E4432E8D3FC4BBCB1EA956471D0813F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_33BE46DA83704396A3FC5B9E05A21C8A }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'bankapp56'
          slot-name: 'Production'
          package: .
          
